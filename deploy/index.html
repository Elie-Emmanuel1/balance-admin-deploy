<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BALANCE CONSULTING — Platform Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<link rel="icon" id="favicon-link" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Crect width=%22100%22 height=%22100%22 rx=%2220%22 fill=%22%231A56DB%22/%3E%3Ctext x=%2250%22 y=%2266%22 font-family=%22Arial%22 font-weight=%22800%22 font-size=%2238%22 fill=%22white%22 text-anchor=%22middle%22%3EBC%3C/text%3E%3C/svg%3E"/>
<meta name="theme-color" content="#1A56DB"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="BC Admin"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#04080F;--bg2:#080F12;--card:#0D1517;--card2:#111A1E;
  --border:#1A2A30;--border2:#253C44;
  --text:#CAE9F5;--w:#FFFFFF;--muted:#4A7C8E;
  --acc:#1A56DB;--acc2:#1344C0;--acc3:#6B9FFF;--blue-light:#3B9EFF;
  --green:#10B981;--gold:#F59E0B;--gold2:#FCD34D;
  --red:#EF4444;--blue:#3B82F6;--cyan:#06B6D4;
  --purple:#8B5CF6;--orange:#F97316;
}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;overflow-x:hidden;}
/* SIDEBAR */
#sidebar{width:220px;min-height:100vh;background:linear-gradient(180deg,#04091A,#060C1E 60%,#050A18);border-right:1px solid #1A2D50;flex-shrink:0;display:flex;flex-direction:column;}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid var(--border);}
.sb-logo-title{font-size:13px;font-weight:700;color:var(--w);}
.sb-logo-sub{font-size:10px;color:var(--muted);margin-top:2px;}
.sb-badge{display:inline-block;background:var(--purple);color:#fff;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-top:4px;}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;}
.sb-section{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);padding:12px 8px 4px;}
.nb{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:none;background:transparent;color:var(--muted);cursor:pointer;border-radius:8px;font-size:12px;font-family:'Inter',sans-serif;text-align:left;transition:all .15s;}
.nb:hover{background:var(--card);color:var(--text);}
.nb.active{background:linear-gradient(90deg,var(--acc)22,var(--acc)08,transparent);color:#fff;font-weight:700;border-left:3px solid var(--acc);padding-left:7px;}
.nb .ni{font-size:15px;flex-shrink:0;width:20px;text-align:center;}
.nb .cnt{margin-left:auto;background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;}
.sb-footer{padding:12px 16px;border-top:1px solid var(--border);}
.sb-user{font-size:11px;color:var(--muted);margin-bottom:8px;}
.sb-user strong{color:var(--text);display:block;font-size:12px;}
/* MAIN */
#main{flex:1;display:flex;flex-direction:column;min-width:0;}
#topbar{height:52px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:12px;}
#topbar input{flex:1;max-width:320px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:7px 12px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;}
#topbar input:focus{outline:none;border-color:var(--acc);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
#content{flex:1;overflow-y:auto;padding:0;;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.pg{display:none;padding:24px;}
.pg.active{display:block;}
/* CARDS & LAYOUT */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;}
@media(max-width:900px){.g4{grid-template-columns:repeat(2,1fr);}.g3{grid-template-columns:1fr 1fr;}}
@media(max-width:768px){#sidebar{display:none!important;} #main{width:100%;} .g4{grid-template-columns:1fr 1fr;} .g2,.g3{grid-template-columns:1fr;} .pg{padding:14px 12px;}}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.card+.card{margin-top:0;}
.ct{font-size:12px;font-weight:700;color:var(--acc3);text-transform:uppercase;letter-spacing:.8px;margin-bottom:12px;}
/* KPIs */
.kpi{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;position:relative;overflow:hidden;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--kc,var(--acc)),transparent);}
.kl{font-size:11px;color:var(--muted);margin-bottom:6px;}
.kv{font-size:22px;font-weight:700;color:var(--w);font-family:'Space Mono',monospace;}
.ks{font-size:10px;color:var(--muted);margin-top:3px;}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:var(--acc2);color:#fff;border:none;border-radius:8px;padding:8px 14px;cursor:pointer;font-size:12px;font-weight:600;font-family:'Inter',sans-serif;transition:all .15s;}
.btn:hover{background:var(--acc);transform:translateY(-1px);}
.btsm{padding:5px 10px;font-size:11px;border-radius:6px;}
.btgh{background:var(--card2);color:var(--text);border:1px solid var(--border2);border-radius:8px;padding:7px 12px;cursor:pointer;font-size:12px;font-family:'Inter',sans-serif;}
.btgh:hover{border-color:var(--acc);color:var(--acc3);}
.btg{background:var(--green)22;color:var(--green);border:1px solid var(--green)44;}
.btg:hover{background:var(--green)33;}
.btr{background:var(--red)22;color:var(--red);border:1px solid var(--red)44;}
.btp{background:var(--purple)22;color:#C4B5FD;border:1px solid var(--purple)44;}
/* TABLE */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--bg2);color:var(--acc3);padding:9px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 12px;border-bottom:1px solid var(--border);vertical-align:middle;}
.tbl tr:hover td{background:var(--card2);}
/* BADGES */
.b{display:inline-flex;align-items:center;padding:2px 7px;border-radius:4px;font-size:10px;font-weight:700;}
.bg{background:var(--green)20;color:var(--green);border:1px solid var(--green)40;}
.br{background:var(--red)20;color:var(--red);border:1px solid var(--red)40;}
.bo{background:var(--gold)20;color:var(--gold2);border:1px solid var(--gold)40;}
.bc{background:var(--cyan)20;color:var(--acc3);border:1px solid var(--cyan)40;}
.bp{background:var(--purple)20;color:#C4B5FD;border:1px solid var(--purple)40;}
/* FORM */
.f{display:flex;flex-direction:column;gap:4px;margin-bottom:10px;}
.f label{font-size:11px;font-weight:600;color:var(--muted);}
.f input,.f select,.f textarea{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 10px;color:var(--text);font-size:12px;font-family:'Inter',sans-serif;}
.f input:focus,.f select:focus,.f textarea:focus{outline:none;border-color:var(--acc);}
.sep{height:1px;background:var(--border);margin:12px 0;}
/* MODAL */
#modalOverlay{display:none;position:fixed;inset:0;background:#00000088;z-index:500;align-items:center;justify-content:center;}
#modalOverlay.open{display:flex;}
#modal{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:24px;max-width:560px;width:90%;max-height:90vh;overflow-y:auto;}
#modalTitle{font-size:15px;font-weight:700;color:var(--w);margin-bottom:16px;}
/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border2);border-radius:10px;padding:10px 16px;font-size:13px;color:var(--w);z-index:900;opacity:0;transform:translateY(10px);transition:all .3s;pointer-events:none;}
#toast.show{opacity:1;transform:translateY(0);}
/* STATUS COLORS */
.app-card{background:var(--card2);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s;}
.app-card:hover{border-color:var(--acc);}
/* CHART MINI */
.sparkline{height:40px;display:flex;align-items:flex-end;gap:3px;}
.spark-bar{background:var(--acc);border-radius:2px 2px 0 0;min-width:6px;transition:height .5s;}
/* SEQUENCE TIMELINE */
.seq{display:flex;gap:0;margin:12px 0;position:relative;}
.seq::before{content:'';position:absolute;top:16px;left:0;right:0;height:2px;background:var(--border);}
.seq-step{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;}
.seq-dot{width:32px;height:32px;border-radius:50%;border:2px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:center;font-size:14px;z-index:1;}
.seq-dot.active{border-color:var(--acc);background:var(--acc)22;}
.seq-dot.done{border-color:var(--green);background:var(--green)22;}
.seq-label{font-size:9px;color:var(--muted);text-align:center;}
/* SECTION HEADER */
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;flex-wrap:wrap;gap:10px;}
.st{font-size:18px;font-weight:700;color:var(--w);}
.ss{font-size:12px;color:var(--muted);margin-top:2px;}
/* LOGIN */
#loginScr{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:800;background-image:radial-gradient(ellipse 70% 50% at 50% 0%,#1A56DB10,transparent);}
.lbox{background:var(--card);border:1px solid var(--border2);border-radius:16px;padding:32px;width:360px;}
.ltitle{font-size:18px;font-weight:700;color:var(--w);margin-bottom:4px;}
.lsub{font-size:12px;color:var(--muted);margin-bottom:20px;}
.lbtn{width:100%;padding:12px;background:linear-gradient(135deg,#1A56DB,#3B9EFF);color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;margin-top:6px;transition:all .2s;}
.lerr{font-size:12px;color:var(--red);margin-top:8px;min-height:18px;}
/* APP ICON */
.app-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
/* ALERT BANNER */
.alert-banner{border-radius:8px;padding:11px 14px;margin-bottom:10px;font-size:12px;line-height:1.7;}
.alert-red{background:var(--red)12;border:1px solid var(--red)33;color:var(--red);}
.alert-gold{background:var(--gold)12;border:1px solid var(--gold)33;color:var(--gold2);}
.alert-green{background:var(--green)12;border:1px solid var(--green)33;color:var(--green);}
/* SCROLLBAR */
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginScr">
  <div class="lbox">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:28px">🏢</div>
      <div class="ltitle">BALANCE CONSULTING</div>
      <div class="lsub">Platform Admin · Tour de contrôle</div>
    </div>
    <div class="f"><label>Identifiant</label><input id="adm_u" placeholder="admin" autocomplete="username"/></div>
    <div class="f"><label>Mot de passe</label><input id="adm_p" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="lbtn" onclick="doLogin()">Connexion</button>
    <div class="lerr" id="loginErr"></div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar" style="display:none">
  <div class="sb-logo"><div id="sidebar-logo" style="width:34px;height:34px;border-radius:9px;background:linear-gradient(135deg,#1A56DB,#3B9EFF);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px;color:#fff;flex-shrink:0;margin-right:6px;overflow:hidden;box-shadow:0 4px 12px #1A56DB40;"></div>
    <div class="sb-logo-title">BALANCE CONSULTING</div>
    <div class="sb-logo-sub">Platform Admin</div>
    <span class="sb-badge">TOUR DE CONTRÔLE</span>
  </div>
  <div class="sb-nav">
    <div class="sb-section">Vue globale</div>
    <button class="nb active" id="nb-dash" onclick="goTo('dash')"><span class="ni">📊</span>Dashboard</button>

    <div class="sb-section">Gestion</div>
    <button class="nb" id="nb-apps" onclick="goTo('apps')"><span class="ni">🚀</span>Applications<span id="cnt-apps" class="cnt" style="display:none"></span></button>
    <button class="nb" id="nb-clients" onclick="goTo('clients')"><span class="ni">👥</span>Clients</button>

    <div class="sb-section">Finances</div>

    <button class="nb" id="nb-facturation" onclick="goTo('facturation')"><span class="ni">🧾</span>Facturation</button>

    <div class="sb-section">Communication</div>
    <button class="nb" id="nb-emails" onclick="goTo('emails')"><span class="ni">📧</span>Emails<span id="cnt-email" class="cnt" style="display:none"></span></button>
    <button class="nb" id="nb-logs" onclick="goTo('logs')"><span class="ni">📋</span>Activité</button>

  <div class="sb-footer">

    <button class="btgh btsm" style="width:100%" onclick="doLogout()">Déconnexion</button>
  </div>
</div>

<!-- MAIN -->
<div id="main" style="display:none">
  <!-- TOPBAR -->
  <div id="topbar">
    <input id="globalSearch" placeholder="🔍  Rechercher un client, une app, une licence..." oninput="globalSearch(this.value)"/>
    <div class="tb-right">
      <button class="btn btsm btg" onclick="syncAll()">🔄 Sync</button>

  <!-- PAGES -->

    <!-- CLIENTS -->

</div>

<!-- MODAL -->
<div id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div id="modal">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div id="modalTitle">—</div>
      <button onclick="closeModal()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1">×</button>
    </div>

</div>
<div id="toast"></div>


<script>

const ROLES = {
  superadmin: { label:'Super Admin', color:'var(--gold2)', access:'Accès complet' },
  admin:      { label:'Admin',       color:'var(--acc3)', access:'Clients, licences, paiements' },
  viewer:     { label:'Lecteur',     color:'var(--muted)', access:'Consultation uniquement' },
};
function getUsers(){ return S.g('admin_users') || [
  { id:'1', nom:'Admin', email:'admin', role:'superadmin', actif:true, password:btoa('BC2026Admin!'), created_at:'2026-01-01' }
];}
function saveUsers(d){ 
  S.s('admin_users', d); 
  if(getApiUrl()) apiCall('saveAdminData', {module:'admin_users', data:d}).catch(()=>{});
}

function rUsers(){
  const users = getUsers();
  const userRows = users.map(u => {
    const role = ROLES[u.role] || ROLES.viewer;
    return '<tr>'+
      '<td style="font-weight:600;color:var(--w)">'+esc(u.nom)+'</td>'+
      '<td style="font-size:11px;color:var(--muted)">'+esc(u.email)+'</td>'+
      '<td><span class="b bc" style="color:'+role.color+'">'+role.label+'</span></td>'+
      '<td style="font-size:11px;color:var(--muted)">'+role.access+'</td>'+
      '<td><span class="b '+(u.actif?'bg':'br')+'">'+(u.actif?'Actif':'Inactif')+'</span></td>'+
      '<td><div style="display:flex;gap:4px">'+
        '<button class="btgh btsm" data-uid="'+u.id+'" onclick="openUserForm(this.dataset.uid)">&#9998;</button>'+
        (u.id!=='1'?'<button class="btgh btsm" data-uid="'+u.id+'" onclick="toggleUser(this.dataset.uid)">'+(u.actif?'&#9208;':'&#9654;')+'</button>':'')+
      '</div></td></tr>';
  }).join('');
  const roleRows = Object.entries(ROLES).map(function(entry){
    var k=entry[0], r=entry[1];
    return '<div style="display:flex;align-items:center;gap:12px;padding:10px 0;border-bottom:1px solid var(--border)">'+
    '<span class="b bc" style="color:'+r.color+';min-width:100px">'+r.label+'</span>'+
    '<span style="font-size:12px;color:var(--text)">'+r.access+'</span></div>';
  }).join('');
  document.getElementById('pg-users').innerHTML =
    '<div class="rh"><div><div class="st">Utilisateurs</div>'+
    '<div class="ss">Gestion des accès à balance-admin</div></div>'+
    '<button class="btn" onclick="openUserForm(null)">+ Nouvel utilisateur</button></div>'+
    '<div class="card"><table class="tbl">'+
    '<thead><tr><th>Nom</th><th>Identifiant</th><th>Rôle</th><th>Accès</th><th>Statut</th><th>Actions</th></tr></thead>'+
    '<tbody>'+userRows+'</tbody></table></div>'+
    '<div class="card" style="margin-top:14px"><div class="ct">Niveaux d\'accès</div>'+roleRows+'</div>';
}

function openUserForm(id){
  const users = getUsers();
  const u = id ? users.find(x=>x.id===id) : null;
  const roleOpts = Object.entries(ROLES).map(function(entry){
    var k=entry[0], r=entry[1];
    return '<option value="'+k+'" '+(u&&u.role===k?'selected':'')+'>'+r.label+' - '+r.access+'</option>';
  }).join('');
  openModal(u?'Modifier '+u.nom:'Nouvel utilisateur',
    '<div class="f"><label>Nom complet *</label><input id="uf_nom" value="'+(u?esc(u.nom):'')+'" placeholder="Ex: Kouassi Jean"/></div>'+
    '<div class="f"><label>Identifiant *</label><input id="uf_email" value="'+(u?esc(u.email):'')+'" placeholder="jean ou jean@..."/></div>'+
    '<div class="f"><label>Mot de passe '+(id?'(vide = inchangé)':'*')+'</label>'+
    '<input id="uf_pass" type="password" placeholder=""/></div>'+
    '<div class="f"><label>Rôle</label><select id="uf_role">'+roleOpts+'</select></div>'+
    '<button class="btn btg" style="width:100%" id="uf_save_btn">Sauvegarder</button>');
  document.getElementById('uf_save_btn').onclick = function(){ saveUser(id||''); };
}

function saveUser(id){
  var nom   = (document.getElementById('uf_nom')?.value||'').trim();
  var email = (document.getElementById('uf_email')?.value||'').trim();
  var pass  = document.getElementById('uf_pass')?.value||'';
  var role  = document.getElementById('uf_role')?.value||'viewer';
  if(!nom||!email){showToast('Nom et identifiant obligatoires',false);return;}
  var users = getUsers();
  if(id){
    var i = users.findIndex(u=>u.id===id);
    if(i>=0){ users[i].nom=nom; users[i].email=email; users[i].role=role; if(pass) users[i].password=btoa(pass); }
  } else {
    if(users.find(u=>u.email===email)){showToast('Identifiant déjà utilisé',false);return;}
    if(!pass){showToast('Mot de passe obligatoire',false);return;}
    users.push({id:uid(),nom:nom,email:email,role:role,actif:true,password:btoa(pass),created_at:TODAY});
  }
  saveUsers(users);
  closeModal();showToast('Utilisateur sauvegardé');rUsers();
}

function toggleUser(id){
  var users=getUsers(), i=users.findIndex(u=>u.id===id);
  if(i>=0){ users[i].actif=!users[i].actif; saveUsers(users); rUsers(); }
}

'use strict';
// ════════════════════════════════════════════════════════════════
// BALANCE CONSULTING PLATFORM ADMIN v3.0
// Architecture Option B — Google Sheets comme source de vérité
// Données JAMAIS dans le navigateur (sauf auth + config)
// ════════════════════════════════════════════════════════════════

// ── SETTERS (écrivent CACHE + API, jamais localStorage) ──────────
// ── OPÉRATIONS PAR LIGNE (multi-appareils safe) ──────────────────
// Chaque opération modifie UNE ligne dans Sheets
// Aucun appareil ne peut écraser les données d'un autre

async function _addRow(module, row){
  if(CACHE[module]) CACHE[module].unshift(row);
  showSync('syncing');
  try{
    const r = await apiCall('addAdminRow', {module, row});
    if(r && r.error){ showSync('err'); showToast('❌ '+r.error, false); return; }
    showSync('ok');
  }catch(e){ showSync('err'); showToast('❌ Écriture impossible : '+e.message, false); console.error('_addRow',module,e); }
}

async function _updateRow(module, idField, idValue, data){
  if(CACHE[module]){
    const i = CACHE[module].findIndex(r=>String(r[idField])===String(idValue));
    if(i>=0) CACHE[module][i] = {...CACHE[module][i], ...data};
  }
  showSync('syncing');
  try{
    const r = await apiCall('updateAdminRow', {module, idField, idValue, data});
    if(r && r.error){ showSync('err'); showToast('❌ '+r.error, false); return; }
    showSync('ok');
  }catch(e){ showSync('err'); showToast('❌ Modification impossible : '+e.message, false); console.error('_updateRow',module,e); }
}

async function _deleteRow(module, idField, idValue){
  if(CACHE[module]){
    CACHE[module] = CACHE[module].filter(r=>String(r[idField])!==String(idValue));
  }
  showSync('syncing');
  try{
    const r = await apiCall('deleteAdminRow', {module, idField, idValue});
    if(r && r.error){ showSync('err'); showToast('❌ '+r.error, false); return; }
    showSync('ok');
  }catch(e){ showSync('err'); showToast('❌ Suppression impossible : '+e.message, false); console.error('_deleteRow',module,e); }
}

// ── API ──────────────────────────────────────────────────────────
// URL et clé par défaut — à remplir avant de déployer
// Ces valeurs sont utilisées sur tous les appareils automatiquement
const DEFAULT_SERVER_URL = ''; // Coller ici l'URL Apps Script
const DEFAULT_ADMIN_KEY  = ''; // Coller ici la clé admin

function getApiUrl(){
  return S.g('server_url') || DEFAULT_SERVER_URL || '';
}
function getAdminKey(){
  return S.g('admin_key') || DEFAULT_ADMIN_KEY || '';
}

async function apiCall(action, params={}){
  // Passe par le proxy Netlify pour éviter les erreurs CORS
  // Le proxy transmet la requête à Google Apps Script côté serveur
  const proxyUrl = '/api/proxy';
  const body = { action, admin_key: getAdminKey(), ...params };
  const r = await fetch(proxyUrl, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  const txt = await r.text();
  try {
    const d = JSON.parse(txt);
    if(d.error) throw new Error(d.error);
    return d;
  } catch(e) { if(e.message!==txt) throw e; return {raw:txt}; }
}

// Indicateur de synchronisation
function showSync(state){
  const el = document.getElementById('syncStatus');
  if(!el) return;
  if(state==='syncing') { el.textContent='🔄 Sync...'; el.style.color='var(--muted)'; }
  else if(state==='ok') { el.textContent='✅ '+new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}); el.style.color='var(--green)'; }
  else if(state==='err') { el.textContent='⚠️ Hors ligne'; el.style.color='var(--gold)'; }
  else if(state==='loading') { el.textContent='⏳ Chargement...'; el.style.color='var(--muted)'; }
}

// Chargement complet depuis l'API
async function loadAllData(){
  showSync('loading');
  try{
    const d = await apiCall('adminDash');
    if(d.error){
      showSync('err');
      showToast('❌ ' + d.error, false);
      return false;
    }
    // Charger toutes les données dans le CACHE
    CACHE.apps      = d.apps      || CACHE.apps      || [];
    CACHE.clients   = d.clients   || CACHE.clients   || [];
    CACHE.licences  = d.licences  || CACHE.licences  || [];
    CACHE.payments  = d.payments  || CACHE.payments  || [];
    CACHE.email_log = d.email_log || CACHE.email_log || [];
    showSync('ok');
    return true;
  }catch(e){
    showSync('err');
    showToast('❌ Connexion impossible : ' + e.message, false);
    return false;
  }
}

let _toastTimer;
function showToast(msg, ok=true){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = ok ? 'var(--green)' : 'var(--red)';
  el.style.color = ok ? 'var(--green)' : 'var(--red)';
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

function doLogin(){
  var u=document.getElementById('adm_u').value.trim();
  var p=document.getElementById('adm_p').value;
  var err=document.getElementById('loginErr');
  var users=getUsers();
  var found=users.find(function(x){return x.email===u||x.nom.toLowerCase()===u.toLowerCase();});
  var ok=false, displayName=u, role='superadmin';
  if(found&&found.actif){ try{ if(btoa(p)===found.password){ok=true;displayName=found.nom;role=found.role;} }catch(e){} }
  if(!ok&&u==='admin'&&p==='BC2026Admin!'){ok=true;displayName='Admin';role='superadmin';}
  if(ok){
    S.s('auth',{user:found?found.email:u,displayName:displayName,role:role,expires:Date.now()+8*3600000});
    document.getElementById('sb-username').textContent=displayName;
    showApp();
  } else {
    err.textContent='Identifiants incorrects';
    setTimeout(function(){err.textContent='';},3000);
  }
}

async function saveApp(id){
  const newApp={
    id:id||document.getElementById('af_id').value.trim().toLowerCase().replace(/\s+/g,'_'),
    nom:document.getElementById('af_nom').value.trim(),
    emoji:document.getElementById('af_emoji').value.trim(),
    desc:document.getElementById('af_desc').value.trim(),
    couleur:document.getElementById('af_col').value,
    actif:true,
    tarifs:{
      MOIS:+document.getElementById('af_mois').value||15000,
      TRIM:+document.getElementById('af_trim').value||40000,
      ANNU:+document.getElementById('af_annu').value||150000,
    }
  };
  if(!newApp.id||!newApp.nom){showToast('ID et nom obligatoires',false);return;}
  if(id){
    await updateApp(id, newApp);
  } else {
    if(getApps().find(a=>a.id===newApp.id)){showToast('ID déjà utilisé',false);return;}
    await addApp(newApp);

  closeModal();showToast('Application sauvegardée ✓');rApps();
}

    <div><div class="st">Licences</div><div class="ss">${lics.length} licence(s) · ${lics.filter(l=>l.active&&daysLeft(l.expiration)>0).length} actives</div></div>

function renderLicTable(lics){
  const apps=getApps();
  if(!lics.length)return'<div style="text-align:center;color:var(--muted);padding:40px">Aucune licence</div>';
  return`<div style="overflow-x:auto"><table class="tbl">
    <thead><tr><th>Client</th><th>Application</th><th>Clé</th><th>Type</th><th>Domaine</th><th>Expiration</th><th>Auto-renew</th><th>Actions</th></tr></thead>
    <tbody>${lics.map(l=>{
      const d=daysLeft(l.expiration);
      const app=apps.find(a=>a.id===l.app_id);
      return`<tr>
        <td style="font-weight:600;color:var(--w)">${esc(l.client)}</td>
        <td>${app?`${app.emoji} ${app.nom}`:'—'}</td>
        <td style="font-family:'Space Mono',monospace;font-size:10px;color:var(--acc3)">${l.cle||'—'}</td>
        <td><span class="b bc">${l.type}</span></td>
        <td style="font-size:11px;color:var(--muted)">${l.domaine||'—'}</td>
        <td><span class="b ${d>30?'bg':d>0?'bo':'br'}">${l.expiration==='DEV'?'Illimitée':d>0?fmtD(l.expiration):'Expirée'}</span></td>
        <td><span class="b ${l.auto_renew?'bg':'br'}">${l.auto_renew?'✅':'Non'}</span></td>
        <td><div style="display:flex;gap:4px">
          ${d<=30&&d>0?`<button class="btn btsm" style="background:var(--gold);color:#000;font-size:10px" onclick="openRenewModal('${l.id}','${esc(l.client)}','${l.app_id}','${l.type}','${l.expiration}')">📧</button>`:''}
          <button class="btgh btsm" onclick="toggleLicActive('${l.id}')">${l.active?'⏸':'▶'}</button>
          <button class="btgh btsm" onclick="deleteLic('${l.id}')">✕</button>
        </div></td>
      </tr>`;
    }).join('')}</tbody></table></div>`;
}

function filterLicences(){
  const appF=document.getElementById('licFilterApp')?.value;
  const stF=document.getElementById('licFilterStatus')?.value;
  let lics=getLicences();
  if(appF)lics=lics.filter(l=>l.app_id===appF);
  if(stF==='active')lics=lics.filter(l=>l.active&&daysLeft(l.expiration)>30);
  if(stF==='expiring')lics=lics.filter(l=>l.active&&daysLeft(l.expiration)<=30&&daysLeft(l.expiration)>0);
  if(stF==='expired')lics=lics.filter(l=>daysLeft(l.expiration)<=0);
  document.getElementById('licTable').innerHTML=renderLicTable(lics);
}

  openModal('+ Nouvelle licence',`
    <div class="g2">
      <div class="f"><label>Client *</label>
        <select id="lf_client">
          <option value="">— Choisir —</option>

      </select>

    </div>

  document.getElementById('lf_app').onchange=previewLicTarif;
}

function previewLicTarif(){
  const appId=document.getElementById('lf_app')?.value;
  const type=document.getElementById('lf_type')?.value;
  const app=getApps().find(a=>a.id===appId);
  const el=document.getElementById('lf_preview');
  if(!el)return;
  if(!app||!type){el.innerHTML='Sélectionner une app et un type';return;}
  const montant=app.tarifs?.[type]||0;
  const duree=type==='MOIS'?'30 jours':type==='TRIM'?'90 jours':type==='ANNU'?'365 jours':'Illimitée';
  const expDate=type==='DEV'?'Illimitée':new Date(Date.now()+(type==='MOIS'?30:type==='TRIM'?90:365)*86400000).toLocaleDateString('fr-FR');
  el.innerHTML=`<strong style="color:var(--acc3)">${app.emoji} ${app.nom}</strong> · ${type} · <strong style="color:var(--gold)">${fmt(montant)}</strong><br>Expire le : <strong style="color:var(--w)">${expDate}</strong>`;
}

async function saveLicence(){
  const client=document.getElementById('lf_client')?.value;
  const appId=document.getElementById('lf_app')?.value;
  const type=document.getElementById('lf_type')?.value;
  const domaine=document.getElementById('lf_domaine')?.value.trim();
  const auto=document.getElementById('lf_auto')?.value==='1';
  if(!client||!appId){showToast('Client et app obligatoires',false);return;}
  const app=getApps().find(a=>a.id===appId);
  const days=type==='MOIS'?30:type==='TRIM'?90:type==='ANNU'?365:0;
  const cle=[type,client.slice(0,4).toUpperCase(),uid().slice(0,4)].join('-');
  const expiration=type==='DEV'?'DEV':new Date(Date.now()+days*86400000).toISOString().slice(0,10);
  const newLic={id:uid(),client,app_id:appId,cle,type,domaine,expiration,active:true,auto_renew:auto,created_at:TODAY,montant_initial:app?.tarifs?.[type]||0};
  await addLicence(newLic);
  closeModal();showToast('Licence créée : '+cle+' ✓');rLicences();
}

async function toggleLicActive(id){
  const lic=getLicences().find(l=>l.id===id);
  if(!lic)return;
  const newActive=!lic.active;
  await updateLicence(id, {active:newActive});
  showToast(newActive?'Licence activée':'Licence suspendue');rLicences();
}
async function deleteLic(id){
  if(!confirm('Supprimer cette licence ?'))return;
  await deleteLicenceRow(id);
  showToast('Licence supprimée');rLicences();
}

function rPayments(){

function updatePayTarif(){
  const appId=document.getElementById('pf_app')?.value;
  const type=document.getElementById('pf_type')?.value;
  const app=getApps().find(a=>a.id===appId);
  const el=document.getElementById('pf_montant');
  if(app&&type&&el&&!el.value) el.value=app.tarifs?.[type]||'';
}

async function savePayment(){
  const client=document.getElementById('pf_client')?.value;
  const appId=document.getElementById('pf_app')?.value;
  const type=document.getElementById('pf_type')?.value;
  const montant=+document.getElementById('pf_montant')?.value;
  const moyen=document.getElementById('pf_moyen')?.value;
  const date=document.getElementById('pf_date')?.value||TODAY;
  const ref=document.getElementById('pf_ref')?.value||'MAN-'+uid();
  if(!client||!montant){showToast('Client et montant obligatoires',false);return;}
  // Ajouter le paiement (UNE ligne)
  const pay={id:uid(),client,app_id:appId,montant,moyen,type_lic:type,date,reference:ref,statut:'success',source:'manual'};
  await addPayment(pay);
  // Renouveler la licence (modifier UNE ligne)
  const lic=getLicences().find(l=>l.client===client&&l.app_id===appId&&l.active);
  if(lic){
    const days=type==='MOIS'?30:type==='TRIM'?90:365;
    const curExp=new Date(lic.expiration);
    const base=curExp>new Date()?curExp:new Date();
    const newExp=new Date(base.getTime()+days*86400000).toISOString().slice(0,10);
    await updateLicence(lic.id, {expiration:newExp, type});
  }
  addEmailLog({type:'PAYMENT_CONFIRM',client,app_id:appId,montant,moyen,statut:'sent'});
  closeModal();showToast('Paiement enregistré + licence renouvelée ✓');rPayments();
}

function openRenewModal(licId,client,appId,type,expiration){

function sendBulkRenewal(type){
  const lics=getLicences();
  const concerned=type==='expired'
    ?lics.filter(l=>l.active&&daysLeft(l.expiration)<=0)
    :lics.filter(l=>l.active&&daysLeft(l.expiration)<=30&&daysLeft(l.expiration)>0);
  if(!concerned.length){showToast('Aucun client concerné',false);return;}
  openModal('📧 Relances — '+concerned.length+' client(s)',`
    <div style="margin-bottom:14px;font-size:13px">${concerned.length} email(s) de relance :</div>
    ${concerned.map(l=>{
      const app=getApps().find(a=>a.id===l.app_id);
      const d=daysLeft(l.expiration);
      return`<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:12px">
        <div><strong>${esc(l.client)}</strong> · ${app?.emoji||''} ${app?.nom||l.app_id}</div>
        <span class="b ${d<=0?'br':'bo'}">${d<=0?'Expirée':d+'j'}</span>
      </div>`;
    }).join('')}
    <button class="btn btg" style="width:100%;margin-top:14px" onclick="confirmBulkSend(${JSON.stringify(concerned.map(l=>l.id))})">
      📧 Envoyer ${concerned.length} relance(s) via Apps Script
    </button>`);
}

async function confirmBulkSend(ids){
  const lics=getLicences();
  for(const id of ids){
    const l=lics.find(x=>x.id===id);
    if(!l)continue;
    addEmailLog({type:'RENEWAL_REMINDER',client:l.client,app_id:l.app_id,statut:'sent'});
    if(getApiUrl()){
      try{ await apiCall('sendRenewalEmail',{data:{client:l.client,type:l.type,expiration:l.expiration,app_id:l.app_id}}); }
      catch(e){ console.warn('Email error:',e.message); }
    }
  }
  closeModal();showToast(ids.length+' relances envoyées ✓');
}

function addDL(desc='',qty=1,pu=0){
  const id=uid();dlIds.push(id);
  const w=document.getElementById('dlW');if(!w)return;
  const d=document.createElement('div');d.id='dl_'+id;
  d.style.cssText='background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px;margin-bottom:7px;';
  d.innerHTML=`<div style="display:grid;grid-template-columns:1fr 55px 115px 105px auto;gap:6px;align-items:end">
    <div class="f" style="margin:0"><label>Description</label><input placeholder="Prestation..." id="dld_${id}" value="${desc}" oninput="calcD()"/></div>
    <div class="f" style="margin:0"><label>Qté</label><input type="number" value="${qty}" min="1" id="dlq_${id}" style="text-align:center" oninput="calcD()"/></div>
    <div class="f" style="margin:0"><label>P.U. HT</label><input type="number" id="dlp_${id}" value="${pu||''}" oninput="calcD()"/></div>
    <div class="f" style="margin:0"><label>Total HT</label><input id="dlt_${id}" readonly style="background:var(--card);color:var(--gold);font-family:'Space Mono',monospace;font-size:11px;text-align:right"/></div>
    <button onclick="rmDL(${id})" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:17px;padding-bottom:6px">×</button>
  </div>`;
  w.appendChild(d);calcD();
}
function rmDL(id){const e=document.getElementById('dl_'+id);if(e)e.remove();dlIds=dlIds.filter(x=>x!==id);calcD();}
function calcD(){
  let ht=0;dlIds.forEach(id=>{const q=+document.getElementById('dlq_'+id)?.value||1,p=+document.getElementById('dlp_'+id)?.value||0,t=q*p;ht+=t;const e=document.getElementById('dlt_'+id);if(e)e.value=new Intl.NumberFormat('fr-FR').format(t);});
  const tva=gb('dcb_tva')?Math.round(ht*0.18):0;const brut=ht+tva;
  const ret=gb('dcb_ret')?Math.round(brut*0.075):0;const net=brut-ret;
  const acomp=+gv('dcb_acomp')||0;
  const el=document.getElementById('dSum');
  if(el)el.innerHTML=`<div class="dtr"><span>Sous-total HT</span><span>${fmt(ht)}</span></div>${tva?`<div class="dtr"><span>TVA 18%</span><span>${fmt(tva)}</span></div>`:''}<div class="dtr"><span>Total brut</span><span>${fmt(brut)}</span></div>${ret?`<div class="dtr ret"><span>Retenue source informel (7,5%)</span><span style="color:#b45309">− ${fmt(ret)}</span></div>`:''}<div class="dtr fin"><span>NET À PAYER</span><span>${fmt(net)}</span></div>${acomp?`<div class="dtr" style="color:var(--green)"><span>Acompte</span><span>− ${fmt(acomp)}</span></div><div class="dtr fin"><span>RESTE DÛ</span><span>${fmt(net-acomp)}</span></div>`:''}`  ;

function calcPPSSI(){

    <div style="background:var(--bg);border-radius:8px;overflow:hidden;margin-top:6px">

  if(!confirm('Convertir ce devis en facture ? Une nouvelle facture sera créée.'))return;
  // Récupérer les données du devis courant depuis le form

  // Générer numéro facture
  const facNum='FAC-'+new Date().getFullYear()+'-'+String(Math.floor(Math.random()*9000)+1000);
  // Modifier le HTML : remplacer DEVIS par FACTURE
  const newHtml=curDoc.html
    .replace(/DEVIS DE PRODUCTION/gi,'FACTURE')
    .replace(/DEVIS/gi,'FACTURE')
    .replace(new RegExp(curDoc.num,'g'),facNum)
    .replace(/Validité[^<]*/gi,'')
    .replace(/Pro forma[^<]*Non contractuel[^<]*/gi,'');
  // Sauvegarder comme nouvelle facture
  const newDoc={
    num:facNum,type:'Facture',date:new Date().toLocaleDateString('fr-FR'),
    client:curDoc.client,html:newHtml,montant:curDoc.montant,
    sigToken:Math.random().toString(36).slice(2,10).toUpperCase()+Date.now().toString(36).toUpperCase(),
    signed:false,signerName:curDoc.signerName,signerRole:curDoc.signerRole
  };

<script id="gsSource" type="text/plain">// ══════════════════════════════════════════════════════════════════
// BALANCE CONSULTING PLATFORM — Apps Script v3.0
// Tour de contrôle multi-applications
// ══════════════════════════════════════════════════════════════════
// INSTALLATION :
// 1. Aller sur script.google.com → Nouveau projet
// 2. Coller ce code (remplacer tout le contenu)
// 3. Sauvegarder → Déployer → Application Web
//    • Exécuter en tant que : Moi
//    • Qui a accès : Tout le monde
// 4. Copier l'URL → Coller dans balance-admin Config
// 5. Exécuter setupTriggers() UNE seule fois
// 6. Configurer les Script Properties (voir bas du fichier)
// ══════════════════════════════════════════════════════════════════

const SS = SpreadsheetApp.getActiveSpreadsheet();
const PROPS = PropertiesService.getScriptProperties();

// Clé admin (depuis Script Properties — ne jamais mettre en dur)
function getAdminKey() { return PROPS.getProperty('ADMIN_KEY') || ''; }

// ── ONGLETS GOOGLE SHEETS ────────────────────────────────────────
const SCHEMAS = {
  apps:     ['id','nom','emoji','desc','couleur','actif','tarif_mois','tarif_trim','tarif_annu'],
  clients:  ['nom','email','tel','secteur','ville','date_inscription','actif','notes'],
  licences: ['id','client','app_id','cle','type','domaine','expiration','active','auto_renew','created_at','montant_initial'],
  payments: ['id','client','app_id','montant','moyen','reference','statut','type_lic','date','source','processed_at'],
  email_log:['id','ts','type','client','app_id','statut','detail'],
  audit_log:['ts','user','action','module','detail'],
  sessions: ['token','user','expires','ip'],
};

function getSheet(name) {
  let sh = SS.getSheetByName(name);
  if (!sh) {
    sh = SS.insertSheet(name);
    const cols = SCHEMAS[name];
    if (cols) {
      sh.getRange(1, 1, 1, cols.length).setValues([cols])
        .setFontWeight('bold').setBackground('#0D1517').setFontColor('#90E0EF');
      sh.setFrozenRows(1);
    }
  }
  return sh;
}

function sheetToObjects(name) {
  const sh = getSheet(name);
  if (sh.getLastRow() <= 1) return [];
  const cols = SCHEMAS[name];
  const rows = sh.getRange(2, 1, sh.getLastRow() - 1, cols.length).getValues();
  return rows
    .filter(r => r[0] !== '' && r[0] !== null)
    .map(row => {
      const obj = {};
      cols.forEach((col, i) => {
        const v = row[i];
        obj[col] = (v instanceof Date) ? v.toISOString().slice(0, 10)
          : (v === true || v === 'TRUE') ? true
          : (v === false || v === 'FALSE') ? false
          : v;
      });
      return obj;
    });
}

function appendRow(sheetName, data) {
  const sh = getSheet(sheetName);
  const cols = SCHEMAS[sheetName];
  const row = cols.map(col => {
    const v = data[col];
    return (v === undefined || v === null) ? '' : v;
  });
  sh.appendRow(row);
  const lastRow = sh.getLastRow();
  sh.getRange(lastRow, 1, 1, cols.length)
    .setBackground(lastRow % 2 === 0 ? '#080F12' : '#0D1517')
    .setFontColor('#CAE9F5');
}

function updateRow(sheetName, matchCol, matchVal, data) {
  const sh = getSheet(sheetName);
  const cols = SCHEMAS[sheetName];
  const colIdx = cols.indexOf(matchCol);
  if (colIdx < 0) return false;
  const rows = sh.getLastRow() > 1
    ? sh.getRange(2, 1, sh.getLastRow() - 1, cols.length).getValues()
    : [];
  for (let i = 0; i < rows.length; i++) {
    if (String(rows[i][colIdx]) === String(matchVal)) {
      Object.entries(data).forEach(([k, v]) => {
        const ci = cols.indexOf(k);
        if (ci >= 0) sh.getRange(i + 2, ci + 1).setValue(v);
      });
      return true;
    }
  }
  return false;
}

// ── RÉPONSES HTTP ────────────────────────────────────────────────
function out(data) {
  return ContentService.createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}

function err(msg) { return out({ error: msg }); }

// ── ROUTING ──────────────────────────────────────────────────────
function doGet(e) {
  const p = e.parameter || {};
  const a = p.action || '';
  const k = p.admin_key || p.token || '';

  // Routes publiques
  if (a === 'ping') return out({ pong: true, ts: new Date().toISOString() });
  if (a === 'checkLic') return out(checkLicence(p.key, p.domain));
  if (a === 'checkSession') return out(checkSession(k));

  // Routes admin protégées
  if (!verifyAdmin(k)) return err('Accès refusé');
  if (a === 'adminDash') return out(adminDash());
  if (a === 'getApps') return out({ apps: sheetToObjects('apps') });
  if (a === 'getClients') return out({ clients: sheetToObjects('clients') });
  if (a === 'getLicences') return out({ licences: sheetToObjects('licences') });
  if (a === 'getPayments') return out({ payments: sheetToObjects('payments') });
  if (a === 'getEmailLog') return out({ logs: sheetToObjects('email_log') });

  return err('Action inconnue: ' + a);
}

function doPost(e) {
  let body = {};
  try { body = JSON.parse(e.postData.contents || '{}'); } catch (ex) {}
  const a = body.action || '';
  const k = body.admin_key || body.token || '';

  // Routes publiques — pas d'auth requise
  if (a === 'ping') return out({ pong: true, ts: new Date().toISOString() });

  // Webhook paiement — pas besoin d'auth (vient de Wave/OM)
  if (a === 'webhook_payment' || a === 'processWebhookPayment') {
    processWebhook(body.payload || body, body.source || 'unknown');
    return out({ received: true });
  }

  // Auth routes
  if (a === 'login') return out(login(body.username, body.password));
  if (a === 'verify2fa') return out(verify2fa(body.username, body.code));

  // Routes admin
  if (!verifyAdmin(k)) return err('Accès refusé');
  if (a === 'saveApp')      { saveApp(body.data); return out({ ok: true }); }
  if (a === 'saveClient')   { saveClient(body.data); return out({ ok: true }); }
  if (a === 'saveLicence')  { return out(saveLicence(body.data)); }
  if (a === 'recordPayment'){ return out(recordPayment(body.data)); }
  if (a === 'renewLicence') { return out(renewLicence(body.client, body.app_id, body.type)); }
  if (a === 'toggleLic')    { toggleLicActive(body.id, body.active); return out({ ok: true }); }
  if (a === 'sendRenewalEmail') { return out(sendRenewalEmail(body.data)); }
  if (a === 'sendMonthlyReports') { sendMonthlyReports(); return out({ ok: true }); }
  if (a === 'revokeSession'){ revokeSession(k); return out({ ok: true }); }
  if (a === 'setupTriggers'){ setupTriggers(); return out({ ok: true }); }
  if (a === 'addAuditLog')  { addAuditLog(body.entry || {}); return out({ ok: true }); }
  if (a === 'saveAdminData') { saveAdminModule(body.module, body.data); return out({ ok: true }); }
  if (a === 'loadAdminData') { return out({ data: loadAdminModule(body.module) }); }
  if (a === 'saveModule')   { saveModuleData(body.module, body.data); return out({ ok: true }); }
  if (a === 'loadModule')   { return out({ data: loadModuleData(body.module) }); }
  if (a === 'saveAll')      { saveAllData(body.data); return out({ ok: true }); }
  if (a === 'loadAll')      { return out(loadAllData()); }

  return err('Action inconnue: ' + a);
}

// ── AUTH ADMIN ───────────────────────────────────────────────────
function verifyAdmin(key) {
  if (!key) return false;
  return key === getAdminKey();
}

function login(username, password) {
  const expected_u = PROPS.getProperty('ADMIN_USERNAME') || 'admin';
  const expected_p = PROPS.getProperty('ADMIN_PASSWORD') || 'BC2026Admin!';
  if (username !== expected_u || password !== expected_p) {
    return { error: 'Identifiants incorrects' };
  }
  const token = Utilities.getUuid();
  const expires = new Date(Date.now() + 8 * 3600000).toISOString();
  appendRow('sessions', { token, user: username, expires, ip: '' });
  return { ok: true, token, expires, user: { username, fullName: 'Admin BALANCE', role: 'superadmin' } };
}

function checkSession(token) {
  if (!token) return { valid: false };
  const sessions = sheetToObjects('sessions');
  const s = sessions.find(x => x.token === token);
  if (!s) return { valid: false };
  if (new Date(s.expires) < new Date()) return { valid: false, reason: 'expired' };
  return { valid: true, user: { username: s.user } };
}

function revokeSession(token) {
  const sh = getSheet('sessions');
  const rows = sh.getLastRow() > 1
    ? sh.getRange(2, 1, sh.getLastRow() - 1, 4).getValues()
    : [];
  for (let i = 0; i < rows.length; i++) {
    if (rows[i][0] === token) { sh.deleteRow(i + 2); return; }

// ── LICENCE CHECK (appelé par l'app cliente) ─────────────────────
function checkLicence(key, domain) {
  if (!key) return { valid: false, reason: 'no_key' };

  // Clé DEV spéciale
  if (key === 'DEV-DEMO-2026-STPR') {
    return { valid: true, type: 'DEV', exp: 0, days: 9999 };
  }

  const licences = sheetToObjects('licences');
  const lic = licences.find(l => l.cle === key);
  if (!lic) return { valid: false, reason: 'not_found' };
  if (!lic.active) return { valid: false, reason: 'inactive' };

  // Vérification domaine
  if (lic.domaine && lic.domaine !== '*' && domain) {
    if (!domain.includes(lic.domaine) && !lic.domaine.includes(domain)) {
      return { valid: false, reason: 'domain_mismatch', expected: lic.domaine };
    }
  }

  if (lic.expiration === 'DEV') return { valid: true, type: 'DEV', days: 9999 };

  const daysLeft = Math.ceil((new Date(lic.expiration) - Date.now()) / 86400000);
  if (daysLeft <= 0) return { valid: false, reason: 'expired', type: lic.type };

  return {
    valid: true, type: lic.type, days: daysLeft,
    expiration: lic.expiration, client: lic.client, app_id: lic.app_id
  };
}

// ── WEBHOOK WAVE / ORANGE MONEY ──────────────────────────────────
function processWebhook(payload, source) {
  try {
    let client = '', montant = 0, reference = '', type_lic = '', app_id = '';

    if (source === 'wave' || payload.type?.includes('payment') || payload.wave_transfer_id) {
      const meta = payload.metadata || payload.custom_data || {};
      client    = meta.client || meta.client_nom || '';
      montant   = +(payload.amount || payload.net_amount || 0);
      reference = payload.id || payload.wave_transfer_id || '';
      type_lic  = meta.type_lic || detectTypeLic(montant);
      app_id    = meta.app_id || 'studiopro';
    } else if (source === 'orange_money' || payload.transactionId) {
      client    = payload.customerMsisdn || payload.clientName || '';
      montant   = +(payload.amount || 0);
      reference = payload.transactionId || '';
      type_lic  = detectTypeLic(montant);
      app_id    = payload.app_id || 'studiopro';
    }

    if (!montant) {
      Logger.log('Webhook rejeté — montant 0 : ' + JSON.stringify(payload).slice(0, 200));
      return;
    }

    // Si pas de client dans metadata, chercher par domaine
    if (!client && payload.domain) {
      const lics = sheetToObjects('licences');
      const lic = lics.find(l => l.domaine && payload.domain.includes(l.domaine));
      if (lic) client = lic.client;
    }

    recordPayment({
      client: client || 'Inconnu',
      app_id, montant, type_lic,
      moyen: source === 'wave' ? 'Wave' : 'Orange Money',
      reference, statut: 'success',
      date: new Date().toISOString().slice(0, 10),
      source,
    });

    Logger.log('Webhook traité : ' + client + ' · ' + montant + ' FCFA · ' + source);
  } catch (e) {
    Logger.log('Erreur webhook : ' + e.message);
  }
}

function detectTypeLic(montant) {
  const m = +montant;
  const tMois = +(PROPS.getProperty('TARIF_MOIS') || 15000);
  const tTrim = +(PROPS.getProperty('TARIF_TRIM') || 40000);
  if (m <= tMois * 1.1) return 'MOIS';
  if (m <= tTrim * 1.1) return 'TRIM';
  return 'ANNU';
}

function setupTriggers() {
  // Supprimer tous les triggers existants
  ScriptApp.getProjectTriggers().forEach(t => ScriptApp.deleteTrigger(t));

  // J-30, J-7, J-3 : vérification quotidienne à 8h
  ScriptApp.newTrigger('checkAndSendRenewals').timeBased().everyDays(1).atHour(8).create();

  // Suspension à minuit
  ScriptApp.newTrigger('suspendExpiredLicences').timeBased().everyDays(1).atHour(0).create();

  // Rapport mensuel le 1er du mois à 9h
  ScriptApp.newTrigger('sendMonthlyReports').timeBased().onMonthDay(1).atHour(9).create();

  Logger.log('✅ Triggers installés : relances J-30/J-7/J-3, suspension J0, rapport mensuel');
}

function checkAndSendRenewals() {
  const licences = sheetToObjects('licences');
  const apps = sheetToObjects('apps');
  const emailLog = sheetToObjects('email_log');
  const today = new Date().toISOString().slice(0, 10);

  licences.forEach(l => {
    if (!l.active || l.expiration === 'DEV') return;
    const days = Math.ceil((new Date(l.expiration) - Date.now()) / 86400000);

    // Envoyer uniquement aux jalons : 30, 15, 7, 3, 1
    const shouldSend = [30, 15, 7, 3, 1].includes(days);
    if (!shouldSend) return;

    // Vérifier qu'on n'a pas déjà envoyé aujourd'hui pour ce client/app/jalons
    const alreadySent = emailLog.some(e =>
      e.type === 'RENEWAL_REMINDER' &&
      e.client === l.client &&
      e.app_id === l.app_id &&
      e.ts?.startsWith(today)
    );
    if (alreadySent) return;

    const app = apps.find(a => a.id === l.app_id) || {};
    sendRenewalEmail({
      client: l.client, type: l.type,
      expiration: l.expiration, app_id: l.app_id,
    });

    Logger.log('Relance J-' + days + ' envoyée : ' + l.client + ' · ' + (app.nom || l.app_id));
  });
}

                <p style="margin-top:16px">Pour réactiver votre compte, procédez au renouvellement de votre licence.<br>
                Vos données sont conservées pendant 30 jours.</p>
                <p style="margin-top:16px;font-size:12px;color:#64748B">
                  📞 +225 0700776975 · BALANCE CONSULTING
                </p>
              </div>
            </div>`,
            name: 'BALANCE CONSULTING',
          });
        } catch(e) { Logger.log('Email suspension erreur : ' + e.message); }
      }
      Logger.log('Licence suspendue : ' + l.client + ' · ' + l.app_id);
    }
  });
}

// ── DONNÉES APP (StudioPro modules) ─────────────────────────────
function saveModuleData(module, data) {
  const cols = {
    projets: ['id','titre','type','statut','client','contact','budget','b_equipe','b_materiel','b_deplacement','b_postprod','b_hebergement','b_divers','acompte','facture','avancement','debut','fin','lieu','notes','jours_estimes','jours_reels','archived','created_at','updated_at'],
    ventes: ['id','date','client','produit','categorie','qte','prix_unit','total','statut_pmt','updated_at'],
    stock: ['id','nom','categorie','marque','prix_achat','prix_vente','stock','stock_min','updated_at'],
    services: ['id','date','client','titre','categorie','montant','statut','updated_at'],
    formations: ['id','titre','statut','mode','formateur','inscrits','max','tarif','debut','fin','lieu','updated_at'],
    membres: ['id','nom','prenom','role','specialite','statut','tarif_jour','tel','email','updated_at'],
    tarifs: ['id','nom','categorie','unite','prix','prix_min','prix_max','updated_at'],
  };
  const shCols = cols[module];
  if (!shCols) return;
  let sh = SS.getSheetByName('data_' + module);
  if (!sh) { sh = SS.insertSheet('data_' + module); }
  sh.clearContents();
  sh.getRange(1, 1, 1, shCols.length).setValues([shCols]).setFontWeight('bold').setBackground('#0D1517').setFontColor('#90E0EF');
  const items = Array.isArray(data) ? data : (typeof data === 'string' ? JSON.parse(data) : []);
  if (!items.length) return;
  const rows = items.map(item => shCols.map(col => {
    const v = item[col]; return (v === undefined || v === null) ? '' : typeof v === 'object' ? JSON.stringify(v) : v;
  }));
  sh.getRange(2, 1, rows.length, shCols.length).setValues(rows);
}

function loadModuleData(module) {
  const sh = SS.getSheetByName('data_' + module);
  if (!sh || sh.getLastRow() <= 1) return [];
  const cols = sh.getRange(1, 1, 1, sh.getLastColumn()).getValues()[0];
  const rows = sh.getRange(2, 1, sh.getLastRow() - 1, cols.length).getValues();
  return rows.filter(r => r[0] !== '').map(row => {
    const obj = {};
    cols.forEach((col, i) => { if (row[i] !== '') obj[col] = row[i]; });
    return obj;
  });
}

function saveAllData(data) {
  if (!data) return;
  ['projets','ventes','stock','services','formations','membres','tarifs'].forEach(k => {
    if (data[k]) saveModuleData(k, data[k]);
  });
}

function loadAllData() {
  const modules = ['projets','ventes','stock','services','formations','membres','tarifs'];
  const result = {};
  modules.forEach(k => { result[k] = loadModuleData(k); });
  return result;
}

// ── ADMIN DATA (apps, clients, licences, payments) ──────────────
function saveAdminModule(module, data) {
  if (!SCHEMAS[module]) return;
  const sh = getSheet(module);
  sh.clearContents();
  const cols = SCHEMAS[module];
  sh.getRange(1, 1, 1, cols.length).setValues([cols])
    .setFontWeight('bold').setBackground('#0D1517').setFontColor('#90E0EF');
  if (!data || !data.length) return;
  const rows = data.map(item => cols.map(col => {
    const v = item[col];
    return (v === undefined || v === null) ? ''
      : (typeof v === 'boolean') ? (v ? 'TRUE' : 'FALSE')
      : (typeof v === 'object') ? JSON.stringify(v) : v;
  }));
  sh.getRange(2, 1, rows.length, cols.length).setValues(rows);
  for (let i = 0; i < rows.length; i++) {
    sh.getRange(i + 2, 1, 1, cols.length)
      .setBackground(i % 2 === 0 ? '#080F12' : '#0D1517')
      .setFontColor('#CAE9F5');
  }
}

function loadAdminModule(module) {
  if (!SCHEMAS[module]) return [];
  const sh = SS.getSheetByName(module);
  if (!sh || sh.getLastRow() <= 1) return [];
  const cols = SCHEMAS[module];
  const rows = sh.getRange(2, 1, sh.getLastRow() - 1, cols.length).getValues();
  return rows.filter(r => r[0] !== '').map(row => {
    const obj = {};
    cols.forEach((col, i) => {
      const v = row[i];
      if (v === '' || v === null) return;
      if (v === 'TRUE') { obj[col] = true; return; }
      if (v === 'FALSE') { obj[col] = false; return; }
      if (v instanceof Date) { obj[col] = v.toISOString().slice(0, 10); return; }
      try { obj[col] = JSON.parse(v); } catch(e) { obj[col] = v; }
    });
    return obj;
  });
}

// ── AUDIT LOG ────────────────────────────────────────────────────
function addAuditLog(entry) {
  appendRow('audit_log', {
    ts: new Date().toISOString(),
    user: entry.user || 'system',
    action: entry.action || '',
    module: entry.module || '',
    detail: entry.detail || '',
  });
}

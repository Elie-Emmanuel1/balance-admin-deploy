<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>BALANCE CONSULTING — Admin v3</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#08080F;
  --sb:#0C0C16;
  --surface:#12121E;
  --surface2:#181826;
  --card:#1C1C2E;
  --card2:#222235;
  --border:rgba(255,255,255,0.05);
  --border2:rgba(255,255,255,0.09);
  --border3:rgba(255,255,255,0.14);
  --text:#8A8FAF;
  --w:#D8DCEF;
  --ww:#F0F2FF;
  --muted:#3A3D5A;
  --gold:#C9873A;
  --gold2:#E8A84A;
  --gold3:#F5C878;
  --gold-bg:rgba(201,135,58,0.08);
  --gold-border:rgba(201,135,58,0.2);
  --green:#2DBD8A;
  --green-bg:rgba(45,189,138,0.08);
  --green-border:rgba(45,189,138,0.2);
  --red:#E05252;
  --red-bg:rgba(224,82,82,0.08);
  --red-border:rgba(224,82,82,0.2);
  --blue:#5B8FE8;
  --blue-bg:rgba(91,143,232,0.08);
  --blue-border:rgba(91,143,232,0.2);
  --purple:#9278E0;
  --purple-bg:rgba(146,120,224,0.08);
  --cyan:#38C4D8;
  --cyan-bg:rgba(56,196,216,0.08);
  --sb-w:260px;
  --sb-col:58px;
  --font:'Plus Jakarta Sans',sans-serif;
  --display:'Syne',sans-serif;
  --mono:'JetBrains Mono',monospace;
}

body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;display:flex;font-size:13px;overflow-x:hidden;}

/* ── NOISE OVERLAY ── */
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:.4;}

/* ── SIDEBAR ── */
#sb{width:var(--sb-w);min-height:100vh;background:var(--sb);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s cubic-bezier(.4,0,.2,1);overflow:hidden;position:relative;z-index:50;}
#sb.col{width:var(--sb-col);}
.sb-top{padding:20px 16px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;overflow:hidden;white-space:nowrap;flex-shrink:0;}
.sb-logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:12px;color:#08080F;flex-shrink:0;letter-spacing:.5px;}
.sb-brand{overflow:hidden;}
.sb-name{font-family:var(--display);font-size:12px;font-weight:700;color:var(--ww);letter-spacing:.5px;}
.sb-ver{font-size:10px;color:var(--muted);margin-top:1px;}
.sb-toggle{position:absolute;right:-11px;top:24px;width:22px;height:22px;background:var(--card);border:1px solid var(--border2);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:var(--muted);z-index:60;transition:all .2s;}
.sb-toggle:hover{color:var(--gold);border-color:var(--gold-border);}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto;overflow-x:hidden;}
.sb-nav::-webkit-scrollbar{width:2px;}
.sb-nav::-webkit-scrollbar-thumb{background:var(--border2);}
.sb-section{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--muted);padding:14px 10px 5px;white-space:nowrap;transition:opacity .2s;}
#sb.col .sb-section{opacity:0;pointer-events:none;}
.nb{display:flex;align-items:center;gap:10px;width:100%;padding:8px 10px;border:none;background:transparent;color:var(--text);cursor:pointer;border-radius:8px;font-size:12px;font-family:var(--font);text-align:left;transition:all .15s;white-space:nowrap;position:relative;}
.nb:hover{background:var(--surface);color:var(--w);}
.nb.active{background:var(--gold-bg);color:var(--gold2);border-left:2px solid var(--gold);padding-left:8px;font-weight:500;}
.nb .ni{font-size:14px;width:20px;text-align:center;flex-shrink:0;}
.nb .nl{flex:1;overflow:hidden;transition:opacity .2s,width .2s;}
#sb.col .nb .nl{opacity:0;width:0;}
.nb .badge{background:var(--red);color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:10px;margin-left:auto;}
#sb.col .nb .badge{position:absolute;top:4px;right:4px;margin:0;}
.sb-foot{border-top:1px solid var(--border);padding:12px 8px;}
.sb-user{display:flex;align-items:center;gap:9px;padding:6px 10px;overflow:hidden;}
.sb-av{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#08080F;flex-shrink:0;}
.sb-info{overflow:hidden;transition:opacity .2s;}
#sb.col .sb-info{opacity:0;}
.sb-uname{font-size:12px;font-weight:500;color:var(--w);}
.sb-role{font-size:10px;color:var(--muted);}
.sb-out{margin-top:6px;width:100%;padding:7px;background:transparent;border:1px solid var(--border2);border-radius:8px;color:var(--muted);font-size:11px;font-family:var(--font);cursor:pointer;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:6px;}
.sb-out:hover{border-color:var(--red-border);color:var(--red);}
#sb.col .sb-out span{display:none;}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;min-width:0;z-index:1;}
#topbar{height:54px;background:var(--sb);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 22px;gap:14px;flex-shrink:0;}
.tb-search{flex:1;max-width:320px;background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:7px 12px;color:var(--text);font-size:12px;font-family:var(--font);display:flex;align-items:center;gap:8px;}
.tb-search input{background:transparent;border:none;color:var(--w);font-family:var(--font);font-size:12px;flex:1;outline:none;}
.tb-search input::placeholder{color:var(--muted);}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.tb-date{font-size:11px;color:var(--muted);font-family:var(--mono);}
.tb-sync{display:flex;align-items:center;gap:6px;padding:6px 12px;border-radius:8px;border:1px solid var(--gold-border);background:var(--gold-bg);color:var(--gold2);font-size:11px;font-weight:500;cursor:pointer;font-family:var(--font);transition:all .15s;}
.tb-sync:hover{background:rgba(201,135,58,0.15);}
.tb-notif{width:32px;height:32px;border-radius:8px;border:1px solid var(--border2);background:var(--surface);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--muted);transition:all .15s;}
.tb-notif:hover{color:var(--w);border-color:var(--border3);}
#content{flex:1;overflow-y:auto;background:var(--bg);}
.pg{display:none;padding:26px;}
.pg.active{display:block;}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;}
.card-gold{background:var(--gold-bg);border:1px solid var(--gold-border);}
.card-green{background:var(--green-bg);border:1px solid var(--green-border);}
.card-red{background:var(--red-bg);border:1px solid var(--red-border);}
.ct{font-family:var(--display);font-size:10px;font-weight:600;color:var(--gold);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:14px;}

/* ── GRID ── */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
@media(max-width:1200px){.g4{grid-template-columns:repeat(2,1fr);}}.
@media(max-width:900px){.g3{grid-template-columns:1fr 1fr;}.g2{grid-template-columns:1fr;}}

/* ── KPI ── */
.kpi{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;}
.kpi::after{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,var(--kc,var(--gold)),transparent);}
.kl{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500;}
.kv{font-size:26px;font-weight:600;color:var(--ww);font-family:var(--mono);letter-spacing:-1px;}
.ks{font-size:10px;color:var(--muted);margin-top:5px;}
.ki{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:28px;opacity:.12;}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#08080F;border:none;border-radius:9px;padding:8px 16px;cursor:pointer;font-size:12px;font-weight:600;font-family:var(--font);transition:all .15s;letter-spacing:.2px;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btns{padding:6px 12px;font-size:11px;border-radius:7px;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border2);}
.btn-ghost:hover{background:var(--surface);color:var(--w);border-color:var(--border3);}
.btn-green{background:linear-gradient(135deg,var(--green),#3DD8A4);color:#08080F;}
.btn-red{background:transparent;color:var(--red);border:1px solid var(--red-border);}
.btn-red:hover{background:var(--red-bg);}

/* ── BADGES ── */
.b{display:inline-flex;align-items:center;padding:3px 8px;border-radius:5px;font-size:10px;font-weight:600;letter-spacing:.2px;}
.bg{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border);}
.br{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border);}
.bo{background:var(--gold-bg);color:var(--gold2);border:1px solid var(--gold-border);}
.bb{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue-border);}
.bp{background:var(--purple-bg);color:var(--purple);}
.bc{background:var(--cyan-bg);color:var(--cyan);}

/* ── FORMS ── */
.f{display:flex;flex-direction:column;gap:5px;margin-bottom:12px;}
.f label{font-size:11px;font-weight:500;color:var(--muted);}
.f input,.f select,.f textarea{background:var(--surface);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;color:var(--w);font-size:12px;font-family:var(--font);transition:border-color .15s;outline:none;}
.f input:focus,.f select:focus,.f textarea:focus{border-color:var(--gold);background:var(--surface2);}
.f textarea{resize:vertical;min-height:80px;}
.f select option{background:var(--card);}
.fg2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

/* ── TABLE ── */
.tbl{width:100%;border-collapse:collapse;font-size:12px;}
.tbl th{background:var(--surface);color:var(--gold);padding:9px 14px;text-align:left;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;border-bottom:1px solid var(--border);}
.tbl td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;color:var(--text);}
.tbl tr:hover td{background:var(--surface);color:var(--w);}
.tbl-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(--border);}

/* ── MODAL ── */
#mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:500;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
#mo.open{display:flex;}
#mdl{background:var(--card);border:1px solid var(--border2);border-radius:18px;padding:26px;max-width:640px;width:94%;max-height:90vh;overflow-y:auto;}
#mdl::-webkit-scrollbar{width:3px;}
#mdl::-webkit-scrollbar-thumb{background:var(--border2);}
#mth{font-family:var(--display);font-size:15px;font-weight:700;color:var(--ww);margin-bottom:18px;display:flex;justify-content:space-between;align-items:center;}
#mth button{background:none;border:none;color:var(--muted);cursor:pointer;font-size:18px;}
#mth button:hover{color:var(--w);}

/* ── TOAST ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border2);border-radius:12px;padding:12px 18px;font-size:12px;color:var(--w);z-index:900;opacity:0;transform:translateY(8px);transition:all .3s;pointer-events:none;display:flex;align-items:center;gap:8px;}
#toast.show{opacity:1;transform:translateY(0);}
#toast.err{border-color:var(--red-border);background:rgba(224,82,82,.1);}
#toast.ok{border-color:var(--green-border);}

/* ── SECTION HEADER ── */
.rh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;flex-wrap:wrap;gap:10px;}
.st{font-family:var(--display);font-size:20px;font-weight:700;color:var(--ww);}
.ss{font-size:12px;color:var(--muted);margin-top:3px;}

/* ── TABS ── */
.tab-bar{display:flex;gap:2px;border-bottom:1px solid var(--border);margin-bottom:20px;}
.tab{padding:9px 16px;font-size:12px;font-weight:500;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s;}
.tab.active{color:var(--gold2);border-bottom-color:var(--gold);}
.tab:hover:not(.active){color:var(--w);}
.tc{display:none;}
.tc.active{display:block;}

/* ── PROGRESS ── */
.prog{background:var(--surface2);border-radius:4px;height:4px;overflow:hidden;}
.prog-fill{height:100%;border-radius:4px;transition:width .5s;}

/* ── KANBAN ── */
.kanban{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.kb-col{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;}
.kb-head{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;display:flex;justify-content:space-between;}
.kb-count{background:var(--card);border-radius:4px;padding:1px 7px;font-size:10px;color:var(--text);}
.kb-card{background:var(--card);border:1px solid var(--border);border-radius:9px;padding:11px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}
.kb-card:hover{border-color:var(--gold-border);}
.kb-title{font-size:12px;color:var(--w);margin-bottom:4px;}
.kb-meta{font-size:10px;color:var(--muted);}

/* ── TIMELINE ── */
.tl{display:flex;gap:12px;padding-bottom:16px;position:relative;}
.tl::before{content:'';position:absolute;left:14px;top:28px;bottom:0;width:1px;background:var(--border);}
.tl:last-child::before{display:none;}
.tl-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;border:1px solid var(--border);}
.tl-body{flex:1;padding-top:3px;}
.tl-date{font-size:10px;color:var(--muted);}
.tl-text{font-size:12px;color:var(--text);margin-top:2px;}

/* ── ALERT ── */
.alert{border-radius:10px;padding:12px 16px;margin-bottom:8px;font-size:12px;line-height:1.6;border-left:3px solid;}
.alert.red{background:var(--red-bg);border-color:var(--red);color:var(--red);}
.alert.gold{background:var(--gold-bg);border-color:var(--gold);color:var(--gold2);}
.alert.green{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.alert.blue{background:var(--blue-bg);border-color:var(--blue);color:var(--blue);}

/* ── STEP WIZARD ── */
.wizard-steps{display:flex;gap:0;margin-bottom:24px;background:var(--surface);border-radius:12px;padding:4px;}
.wstep{flex:1;padding:8px;text-align:center;border-radius:9px;cursor:pointer;transition:all .2s;}
.wstep.active{background:var(--gold-bg);color:var(--gold2);}
.wstep.done{color:var(--green);}
.wstep-n{font-size:10px;font-weight:700;margin-bottom:2px;}
.wstep-l{font-size:10px;color:var(--muted);}
.wstep.active .wstep-l,.wstep.done .wstep-l{color:inherit;}

/* ── SCORE METER ── */
.score-meter{display:flex;gap:3px;height:8px;border-radius:4px;overflow:hidden;}
.score-seg{flex:1;border-radius:2px;}

/* ── SEPARATOR ── */
.sep{height:1px;background:var(--border);margin:16px 0;}

/* ── AVATAR ── */
.av{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;}

/* ── LOGIN ── */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:800;}
#login::before{content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(201,135,58,.06) 0%,transparent 70%);pointer-events:none;}
.lbox{background:var(--card);border:1px solid var(--border2);border-radius:20px;padding:36px;width:360px;position:relative;}
.lbox::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.ltop{display:flex;align-items:center;gap:12px;margin-bottom:26px;}
.llogo{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));display:flex;align-items:center;justify-content:center;font-family:var(--display);font-weight:700;font-size:14px;color:#08080F;}
.ltitle{font-family:var(--display);font-size:16px;font-weight:700;color:var(--ww);}
.lsub{font-size:11px;color:var(--muted);margin-top:1px;}
.lbtn{width:100%;padding:12px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#08080F;border:none;border-radius:11px;font-size:13px;font-weight:700;cursor:pointer;font-family:var(--display);letter-spacing:.4px;margin-top:6px;transition:opacity .2s;}
.lbtn:hover{opacity:.9;}
.lerr{font-size:11px;color:var(--red);margin-top:8px;min-height:16px;text-align:center;}

/* ── SPARKLINE ── */
.spark{display:flex;align-items:flex-end;gap:3px;height:48px;}
.spark-b{border-radius:2px 2px 0 0;min-width:6px;flex:1;transition:opacity .2s;cursor:default;}
.spark-b:hover{opacity:.8;}

/* ── ECHÉANCIER ── */
.ech{display:flex;align-items:center;gap:12px;padding:10px 12px;border-radius:9px;background:var(--surface);margin-bottom:6px;border-left:3px solid var(--border);}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
::-webkit-scrollbar-thumb:hover{background:var(--border3);}

/* ── PHASE BADGE ── */
.phase-badge{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;}
.ph1{background:rgba(91,143,232,.1);color:var(--blue);}
.ph2{background:rgba(56,196,216,.1);color:var(--cyan);}
.ph3{background:rgba(201,135,58,.1);color:var(--gold2);}
.ph4{background:rgba(146,120,224,.1);color:var(--purple);}
.ph5{background:rgba(45,189,138,.1);color:var(--green);}
.ph-err{background:var(--red-bg);color:var(--red);}

/* ── MEMBER AVATAR ── */
.member-av{width:24px;height:24px;border-radius:50%;font-size:9px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);}

/* ── TOOLTIP ── */
[data-tip]{position:relative;}
[data-tip]:hover::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);color:var(--w);font-size:10px;padding:4px 8px;border-radius:6px;white-space:nowrap;z-index:100;pointer-events:none;}

@media(max-width:768px){#sb{display:none!important;}.kanban{grid-template-columns:1fr;}.g4,.g3,.g2{grid-template-columns:1fr;}.fg2{grid-template-columns:1fr;}.pg{padding:14px;}}
</style>
</head>
<body>

<!-- ═══════════ LOGIN ═══════════ -->
<div id="login">
  <div class="lbox">
    <div class="ltop">
      <div class="llogo">BC</div>
      <div><div class="ltitle">BALANCE CONSULTING</div><div class="lsub">Plateforme d'administration · v3</div></div>
    </div>
    <div class="f"><label>Identifiant</label><input id="lu" placeholder="votre identifiant" autocomplete="username"/></div>
    <div class="f"><label>Mot de passe</label><input id="lp" type="password" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <button class="lbtn" onclick="doLogin()">Accéder à la plateforme</button>
    <div class="lerr" id="lerr"></div>

function wizNext(step){
  if(step===1){
    const nom=document.getElementById('ex-nom').value.trim();
    if(!nom){toast('Nom obligatoire',false);return;}
  }
  if(step===2){
    const eimpot=document.getElementById('ex-eimpot').value;
    const cnps=document.getElementById('ex-cnps').value;
    const compta=document.getElementById('ex-compta').value;
    const retard=document.getElementById('ex-retard').value;
    const struct=document.getElementById('ex-struct').value;
    // Calcul du score
    let score=0;
    if(eimpot==='non'||eimpot==='inconnu')score+=15;
    if(cnps==='non')score+=20;
    if(compta==='partiel')score+=15;
    if(compta==='non')score+=25;
    if(compta==='jamais')score+=35;
    if(retard==='moins1')score+=15;
    if(retard==='plus1')score+=25;
    if(retard==='plus3')score+=40;
    if(struct==='non'||struct==='inconnu')score+=10;
    score=Math.min(score,100);
    const cas=score<=30?'Cas simple — tarif mensuel standard':'';
    const col=score<=30?'green':score<=60?'gold':'red';
    const label=score<=30?'Cas simple':'score<=60?Cas intermédiaire':'Cas complexe';
    const labelTxt=score<=30?'Cas simple':score<=60?'Cas intermédiaire':'Cas complexe — entretien requis';
    document.getElementById('score-result').innerHTML=`
<div class="card card-${col==='gold'?'gold':col==='red'?'red':'green'}" style="margin-bottom:0">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
    <div style="font-size:13px;font-weight:600;color:var(--${col==='gold'?'gold2':col==='red'?'red':'green'})">${labelTxt}</div>
    <div style="font-family:var(--mono);font-size:22px;font-weight:700;color:var(--${col==='gold'?'gold2':col==='red'?'red':'green'})">${score}/100</div>
  </div>
  <div class="score-meter">
    ${Array(10).fill(0).map((_,i)=>`<div class="score-seg" style="background:${i*10<score?'var(--'+(col==='gold'?'gold':col==='red'?'red':'green')+')':'var(--surface2)'}"></div>`).join('')}
  </div>
  ${score>60?`<div style="font-size:11px;color:var(--red);margin-top:8px">⚠️ Entretien préalable obligatoire avant signature du contrat</div>`:''}
</div>`;
    // Checklist documents
    const docs=['Statuts de la société','RCCM (extrait récent)','Carte contribuable DGI'];
    if(eimpot!=='oui')docs.push('Formulaire d\'inscription e-impôt (fourni par le cabinet)');
    if(cnps==='non')docs.push('Bulletins de salaire des 12 derniers mois','Justificatifs de paiement CNPS');
    if(compta!=='oui')docs.push('Relevés bancaires des 12 derniers mois','Factures fournisseurs et clients disponibles');
    if(retard!=='non')docs.push('Dernières déclarations TVA disponibles','Avis d\'imposition DGI');
    document.getElementById('doc-checklist').innerHTML=docs.map(d=>`<div style="display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px;color:var(--text)">
      <span style="color:var(--muted);font-size:14px">◻</span> ${esc(d)}
    </div>`).join('');
    window._expScore=score;
    window._expEimpot=eimpot==='oui';
    window._expCNPS=cnps==='oui'||cnps==='sans';
  }
  const steps=['wp1','wp2','wp3','wp4'];
  document.getElementById('wp'+step).style.display='none';
  document.getElementById('wp'+(step+1)).style.display='';
  document.querySelectorAll('[id^=ws]').forEach((el,i)=>{
    el.classList.remove('active','done');
    if(i<step)el.classList.add('done');
    else if(i===step)el.classList.add('active');
  });
}

function wizBack(step){
  document.getElementById('wp'+step).style.display='none';
  document.getElementById('wp'+(step-1)).style.display='';
  document.querySelectorAll('[id^=ws]').forEach((el,i)=>{
    el.classList.remove('active','done');
    if(i<step-2)el.classList.add('done');
    else if(i===step-2)el.classList.add('active');
  });
}

function advancePhase(id){
  const experts=getExperts();
  const e=experts.find(x=>x.id===id);
  if(!e)return;
  if(e.phase>=5){toast('Dossier déjà actif',false);return;}
  const phaseNames=['','Pré-qualification','Documents reçus','Audit réalisé','Contrat signé','Actif'];
  e.phase=(e.phase||1)+1;
  S.s('experts',experts);
  addLog(`Dossier Expert — Phase ${e.phase}`,`${e.nom} → ${phaseNames[e.phase]}`);
  if(e.phase===5)toast(`✓ ${e.nom} activé en Mode Expert`);
  else toast(`Dossier avancé : Phase ${e.phase}`);
  updateBadges();
  rExpert();
}

function calcTTC(){
  const ht=parseFloat(document.getElementById('fc-ht')?.value)||0;

function toggleDoc(id,doc,el){
  const creations=getCreations();const cr=creations.find(x=>x.id===id);if(!cr)return;

  el.querySelector('span').style.color=ok?'var(--green)':'var(--muted)';
  el.querySelector('span').textContent=ok?'◉':'◎';
  el.querySelectorAll('span')[1].style.color=ok?'var(--green)':'var(--w)';
}

  const action = e.parameter.action;
  const token = e.parameter.token;

  // Validation token

    return error('Unauthorized');
  }

  if (action === 'getData') {
    const sheetId = e.parameter.sheetId;
    const sheet = SpreadsheetApp

async function testConnection(){

  res.innerHTML='<span style="color:var(--gold2)">Test en cours...</span>';
  const url=S.g('cfg_as');
  if(!url){res.innerHTML='<span style="color:var(--red)">✗ Aucune URL Apps Script configurée</span>';return;}
  try{
    const r=await fetch(url+'?action=ping&token='+S.g('cfg_tok'),{method:'GET'});
    if(r.ok)res.innerHTML='<span style="color:var(--green)">✓ Connexion Apps Script réussie</span>';
    else res.innerHTML=`<span style="color:var(--red)">✗ Erreur HTTP ${r.status}</span>`;
  }catch(e){
    res.innerHTML='<span style="color:var(--red)">✗ Connexion échouée — Vérifiez l\'URL et le déploiement</span>';

function switchTab(page,tab){
  document.querySelectorAll(`#pg-${page} .tab`).forEach((t,i)=>{
    const tabIds=t.parentElement.querySelectorAll('.tab');
    t.classList.toggle('active',t===event.target);
  });
  const allTCs=document.querySelectorAll(`#pg-${page} .tc`);
  const allTabs=document.querySelectorAll(`#pg-${page} .tab`);
  allTabs.forEach((t,i)=>t.classList.toggle('active',t===event.target));
  allTCs.forEach(tc=>tc.classList.remove('active'));
  const target=document.getElementById(`tc-${page}-${tab}`);
  if(target)target.classList.add('active');
}
